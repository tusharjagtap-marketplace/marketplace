apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: gateway-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: spring.profiles.active
            - name: AUTH_HOST
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: auth.service.host
            - name: MARKETPLACE_HOST
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: marketplace.service.host
            - name: PAYMENT_HOST
              valueFrom:
                configMapKeyRef:
                  name: microservices-config
                  key: payment.service.host
            - name: SPRING_CLOUD_GATEWAY_ROUTES_0_URI
              value: "http://$(AUTH_HOST):9000"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_1_URI
              value: "http://$(MARKETPLACE_HOST):8081"
            - name: SPRING_CLOUD_GATEWAY_ROUTES_2_URI
              value: "http://$(PAYMENT_HOST):8082"
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  type: LoadBalancer
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: gateway-service
