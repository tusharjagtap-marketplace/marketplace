name: Build and Deploy to AWS EKS

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: Dev Env

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR Files with Maven
        run: mvn clean package -DskipTests

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker Images to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 1. Build and Push auth-service
          docker build -t $ECR_REGISTRY/auth-service:$IMAGE_TAG -t $ECR_REGISTRY/auth-service:latest ./auth-service
          docker push $ECR_REGISTRY/auth-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/auth-service:latest
          
          # 2. Build and Push gateway-service
          docker build -t $ECR_REGISTRY/gateway-service:$IMAGE_TAG -t $ECR_REGISTRY/gateway-service:latest ./gateway-service
          docker push $ECR_REGISTRY/gateway-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/gateway-service:latest
          
          # 3. Build and Push marketplace-service
          docker build -t $ECR_REGISTRY/marketplace-service:$IMAGE_TAG -t $ECR_REGISTRY/marketplace-service:latest ./marketplace-service
          docker push $ECR_REGISTRY/marketplace-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/marketplace-service:latest
          
          # 4. Build and Push payment-service
          docker build -t $ECR_REGISTRY/payment-service:$IMAGE_TAG -t $ECR_REGISTRY/payment-service:latest ./payment-service
          docker push $ECR_REGISTRY/payment-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/payment-service:latest

      - name: Set up Kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Update Kubernetes Manifests with ECR Images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -i "s|image: auth-service:latest|image: $ECR_REGISTRY/auth-service:$IMAGE_TAG|g" k8s/auth-service.yml
          sed -i "s|image: gateway-service:latest|image: $ECR_REGISTRY/gateway-service:$IMAGE_TAG|g" k8s/gateway-service.yml
          sed -i "s|image: marketplace-service:latest|image: $ECR_REGISTRY/marketplace-service:$IMAGE_TAG|g" k8s/marketplace-service.yml
          sed -i "s|image: payment-service:latest|image: $ECR_REGISTRY/payment-service:$IMAGE_TAG|g" k8s/payment-service.yml

      - name: Deploy to AWS EKS
        run: |
          kubectl apply -f k8s/ --validate=false
