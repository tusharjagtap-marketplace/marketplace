name: Deploy Payment Service

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'payment-service/**'
      - '.github/workflows/deploy-payment.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Payment Service JAR
        run: mvn clean package -pl payment-service -am -DskipTests

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Payment Service Docker Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/payment-service:$IMAGE_TAG -t $ECR_REGISTRY/payment-service:latest ./payment-service
          docker push $ECR_REGISTRY/payment-service:$IMAGE_TAG
          docker push $ECR_REGISTRY/payment-service:latest

      - name: Set up Kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --name ${{ secrets.EKS_CLUSTER_NAME }} --region ${{ secrets.AWS_REGION }}

      - name: Update Payment Service Manifest with ECR Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -i "s|image: payment-service:latest|image: $ECR_REGISTRY/payment-service:$IMAGE_TAG|g" k8s/payment-service.yml

      - name: Deploy Payment Service to AWS EKS
        run: |
          kubectl apply -f k8s/configmap.yml --validate=false
          kubectl apply -f k8s/payment-service.yml --validate=false
