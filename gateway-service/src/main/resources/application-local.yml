server:
  port: 8080

auth:
  service:
    uri: http://localhost:9000

marketplace:
  service:
    uri: http://localhost:8081

payment:
  service:
    uri: http://localhost:8082

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
