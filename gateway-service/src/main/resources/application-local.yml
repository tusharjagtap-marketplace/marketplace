server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:9000
          predicates:
            - Path=/api/auth/**
        - id: marketplace-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/test/**
        - id: payment-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/payment/**

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
