server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:9000
          predicates:
            - Path=/api/auth/**
        - id: auth-actuator
          uri: http://localhost:9000
          predicates:
            - Path=/auth/actuator/**
          filters:
            - StripPrefix=1
        - id: marketplace-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/test/**
        - id: marketplace-actuator
          uri: http://localhost:8081
          predicates:
            - Path=/marketplace/actuator/**
          filters:
            - StripPrefix=1
        - id: payment-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/payment/**
        - id: payment-actuator
          uri: http://localhost:8082
          predicates:
            - Path=/payment/actuator/**
          filters:
            - StripPrefix=1

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
