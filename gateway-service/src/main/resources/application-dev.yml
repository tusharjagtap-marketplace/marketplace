server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://auth-service:9000
          predicates:
            - Path=/api/auth/**

        - id: marketplace-service
          uri: http://marketplace-service:8081
          predicates:
            - Path=/api/test/**

        - id: payment-service
          uri: http://payment-service:8082
          predicates:
            - Path=/api/payment/**

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
