server:
  port: 9000

spring:
  datasource:
    url: jdbc:mysql://${UAT_DB_HOST:uat-db-server}:3306/marketplace_db_uat?createDatabaseIfNotExist=true
    username: ${UAT_DB_USER:uat_user}
    password: ${UAT_DB_PASSWORD:uat_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: when-authorized
