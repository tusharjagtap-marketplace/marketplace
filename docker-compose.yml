version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: marketplace_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "9000:9000"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/marketplace_db?createDatabaseIfNotExist=true
    depends_on:
      mysql-db:
        condition: service_healthy

  marketplace-service:
    build:
      context: ./marketplace-service
      dockerfile: Dockerfile
    container_name: marketplace-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://auth-service:9000/api/auth/jwks
    depends_on:
      - auth-service

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://auth-service:9000/api/auth/jwks
    depends_on:
      - auth-service

  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_CLOUD_GATEWAY_ROUTES_0_URI=http://auth-service:9000
      - SPRING_CLOUD_GATEWAY_ROUTES_1_URI=http://marketplace-service:8081
      - SPRING_CLOUD_GATEWAY_ROUTES_2_URI=http://payment-service:8082
    depends_on:
      - auth-service
      - marketplace-service
      - payment-service

volumes:
  mysql-data:
